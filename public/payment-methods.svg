<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 46" width="300" height="46">
  <!-- Fondo sutil -->
  <rect width="300" height="46" rx="8" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Visa -->
  <g transform="translate(14, 8)">
    <rect width="58" height="30" rx="5" fill="#1434cb"/>
    <text x="29" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">VISA</text>
  </g>
  <!-- Mastercard -->
  <g transform="translate(82, 8)">
    <rect width="58" height="30" rx="5" fill="#231f20"/>
    <circle cx="19" cy="12" r="7" fill="#eb001b"/>
    <circle cx="29" cy="12" r="7" fill="#f79e1b"/>
    <text x="29" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Mastercard</text>
  </g>
  <!-- YAPE -->
  <g transform="translate(150, 8)">
    <rect width="58" height="30" rx="5" fill="#6b21a8"/>
    <text x="29" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">YAPE</text>
    <text x="29" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#d8b4fe">QR · Celular</text>
  </g>
  <!-- PLIN -->
  <g transform="translate(218, 8)">
    <rect width="58" height="30" rx="5" fill="#2563eb"/>
    <text x="29" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">PLIN</text>
    <text x="29" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#93c5fd">Nº Celular</text>
  </g>
</svg>